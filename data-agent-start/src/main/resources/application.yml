server:
  port: 18080

spring:
  application:
    name: liang-data-agent
  autoconfigure:
    exclude:
#      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://118.195.146.161:3306/data_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
#    username: root
#    password: yuanshenniubi
    url: jdbc:mysql://localhost:3306/data_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  # ==================== SQL 初始化 ====================
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
    chat:
      options:
        model: ${OPENAI_MODEL:qwen-plus}

# ==================== Milvus 向量库 ====================
spring.ai.vectorstore.milvus:
  client:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
  database-name: ${MILVUS_DATABASE:data_agent}
  collection-name: ${MILVUS_COLLECTION:data_agent_vectors}
  embedding-dimension: 1024
  initialize-schema: true

# ==================== Elasticsearch 关键词检索 ====================
spring.elasticsearch:
  uris: ${ES_URIS:http://localhost:9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}

# ==================== DataAgent 自定义配置 ====================
data-agent:
  llm-service-mode: STREAM
  vector-store:
    default-similarity-threshold: 0.5
    default-topk-limit: 5
    enable-hybrid-search: false
  file-storage:
    type: ${FILE_STORAGE_TYPE:LOCAL}
    local:
      root-path: data-agent-storage
    minio:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: data-agent
#      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://101.132.158.169:9001}
      auto-create-bucket: true
  pool:
    initial-size: 5
    min-idle: 5
    max-active: 20
    max-wait: 10000
  python-memory-limit: 256
  python-timeout: 30
  code-executor:
    type: AI_SIM
  enrich-sql-result-timeout: 30000

logging:
  level:
    com.liang.data.agent: INFO
    org.springframework.ai: INFO

# ==================== RocketMQ 分块异步任务 ====================
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:118.195.146.161:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:data-agent-producer-group}
    send-message-timeout: 5000
    retry-times-when-send-failed: 2

knowledge:
  chunk:
    vector-task-timeout: 10m
    vector-recovery-interval: 1m
    ai-name-timeout: 30s
    recovery-batch-size: 100
